<!-- store/templates/base.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Мой магазин{% endblock %}</title>
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'home' %}">Главная</a>
            <a href="{% url 'product_list' %}">Товары</a>

            {% if user.is_authenticated %}
                <!-- Ссылки для вошедших пользователей -->
                <a href="{% url 'logout' %}">Выйти ({{ user.username }})</a>
            {% else %}
                <!-- Ссылки для гостей -->
                <a href="{% url 'login' %}">Войти</a>
                <a href="{% url 'register' %}">Регистрация</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
